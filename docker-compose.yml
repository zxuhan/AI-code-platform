# ========================================
# ai-code - Docker Compose (LOCAL DEV)
# ========================================
# Usage:
#   1. Copy .env.example to .env and fill in API keys
#   2. Run: ./start.sh   (or: docker compose up -d --build)
#   3. Visit: http://localhost:8082
#
# This file is for the developer Mac. On the droplet, use docker-compose.prod.yml,
# which reuses folio's mysql/redis containers.
# ========================================

services:
  # ============ MySQL database ============
  mysql:
    image: mysql:8.0
    container_name: ai-code-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_code}
      TZ: ${TZ:-Europe/Amsterdam}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=128M

  # ============ Redis cache ============
  redis:
    image: redis:7-alpine
    container_name: ai-code-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

  # ============ Backend service ============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: zxuhan7/ai-code-backend:latest
    container_name: ai-code-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TZ:-Europe/Amsterdam}

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_code}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Amsterdam&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      GEMINI_API_KEY: ${GEMINI_API_KEY:?Please set GEMINI_API_KEY in .env}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash-lite}
      GEMINI_STREAMING_MODEL: ${GEMINI_STREAMING_MODEL:-gemini-2.5-flash}
      GEMINI_REASONING_MODEL: ${GEMINI_REASONING_MODEL:-gemini-2.5-pro}
      GEMINI_REASONING_MAX_OUTPUT_TOKENS: ${GEMINI_REASONING_MAX_OUTPUT_TOKENS:-32768}

      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}

      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8124}:8123"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============ Frontend service ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: zxuhan7/ai-code-frontend:latest
    container_name: ai-code-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8082}:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============ Networks ============
networks:
  app-network:
    driver: bridge
    name: ai-code-network

# ============ Volumes ============
volumes:
  mysql-data:
    name: ai-code-mysql-data
  redis-data:
    name: ai-code-redis-data
